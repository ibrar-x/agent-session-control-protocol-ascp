name: ascp_sdk_dart
description: Dart SDK for ASCP with typed models, method wrappers, stream events, replay helpers, validation hooks, and replaceable transports.
version: 0.1.0
homepage: https://github.com/ibrar-x/agent-session-control-protocol-ascp/tree/main/sdks/dart#readme
repository: https://github.com/ibrar-x/agent-session-control-protocol-ascp
issue_tracker: https://github.com/ibrar-x/agent-session-control-protocol-ascp/issues
documentation: https://github.com/ibrar-x/agent-session-control-protocol-ascp/tree/main/sdks/dart#readme
topics:
  - ascp
  - sdk
  - json-rpc
  - protocol
  - agent-session-control-protocol

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  build_runner: ^2.7.0
  freezed: ^3.2.3
  json_serializable: ^6.11.0
  lints: ^6.0.0
  test: ^1.26.0
